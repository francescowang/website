<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Post | Francesco Wang</title>
  <link rel="shortcut icon" href="../assets/images/my-avatar.png" type="image/png">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/pages.css">
  <link rel="stylesheet" href="../assets/css/blog.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="../assets/js/vendor/marked.min.js"></script>
</head>

<body class="post-page">

  <main class="post-shell" aria-label="Blog post">
    <article class="post-article active">

      <a href="../index.html#blog" class="text-link post-back-link" aria-label="Back to blog listing">Back to portfolio blog</a>

      <header class="post-header">
        <p class="post-kicker" id="post-category"></p>
        <h1 class="post-title" id="post-title"></h1>

        <div class="post-meta">
          <time id="post-date"></time>
          <span id="post-reading-time"></span>
        </div>

        <div class="blog-post-tags" id="post-tags"></div>
      </header>

      <section class="post-content" id="post-content" aria-live="polite">
        <p>Loading...</p>
      </section>

    </article>
  </main>

  <script src="../assets/js/view-post.js"></script>

</body>

</html>
